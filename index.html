<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Attendance - มล.อุปถัมภ์ไทยคีรี</title>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
    .card { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); box-sizing: border-box; text-align: center; }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
    .btn-purple { background: #6f42c1; }
    .btn-success { background: #28a745; }
    .btn-danger { background: #dc3545; }
    .hidden { display: none; }
    #video-container { position: relative; width: 100%; background: #000; border-radius: 10px; overflow: hidden; min-height: 300px; }
    video { width: 100%; height: auto; display: block; }
    canvas { position: absolute; top: 0; left: 0; }
    #log { margin-top: 10px; padding: 12px; border-radius: 8px; font-weight: bold; background: #fff3cd; color: #856404; transition: 0.3s; }
  </style>
</head>
<body>

  <div id="loginSection" class="card">
    <h2>ครูเข้าสู่ระบบ</h2>
    <input type="text" id="loginUser" placeholder="รหัสประจำตัวครู">
    <input type="password" id="loginPass" placeholder="รหัสผ่าน">
    <button onclick="app.login()" id="loginBtn">เข้าสู่ระบบ</button>
  </div>

  <div id="teacherSection" class="card hidden">
    <h2 id="welcomeText" style="color: #007bff;">สวัสดีครับ</h2>
    <div style="text-align: left; font-size: 14px;">
      <label>วิชา:</label>
      <select id="subjectSelect"><option>วิทยาการคำนวณ</option><option>คอมพิวเตอร์</option></select>
      <label>คาบ:</label>
      <select id="periodSelect"><option>1</option><option>2</option><option>3</option><option>4</option></select>
    </div>
    <button onclick="app.openScanner()" class="btn-success">📸 เริ่มเช็คชื่อ AI</button>
    <button onclick="app.openEnrollment()" class="btn-purple">👤 ลงทะเบียนนักเรียน</button>
    <button onclick="location.reload()" class="btn-danger">ออกจากระบบ</button>
  </div>

  <div id="scannerSection" class="card hidden">
    <h2 id="scanTitle">AI Scanning</h2>
    <div id="video-container"><video id="video" width="400" height="300" autoplay muted playsinline></video></div>
    <div id="log">รอสักครู่...</div>
    <button onclick="app.closeScanner()" class="btn-danger">ปิดหน้าจอนี้</button>
  </div>

  <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyBlxbAtg3vexJCUBlNUAWfO5_mxsK9YHFMBcLUy-ryMXz_243-xxbRGKj_W4wAQQ2UDA/exec"; 
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
    let cameraStream, scanInterval, cachedFaceDb, faceMatcher;

    const app = {
      login: async () => {
        const u = document.getElementById('loginUser').value;
        const p = document.getElementById('loginPass').value;
        if(!u || !p) return;
        document.getElementById('loginBtn').innerText = "กำลังตรวจสอบ...";
        const res = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: "login", username: u, password: p }) }).then(r => r.json());
        if(res.status === "success") {
          window.currentUser = res.user;
          document.getElementById('loginSection').classList.add('hidden');
          document.getElementById('teacherSection').classList.remove('hidden');
          document.getElementById('welcomeText').innerText = "สวัสดีครู " + res.user.name;
        } else { alert(res.message); }
        document.getElementById('loginBtn').innerText = "เข้าสู่ระบบ";
      },

      openEnrollment: () => {
        const id = prompt("รหัสนักเรียน:");
        const name = prompt("ชื่อ-นามสกุล:");
        if(!id || !name) return;
        window.enrollData = { id, name }; window.isRegisterMode = true;
        app.startCamera();
      },

      openScanner: async () => {
        window.isRegisterMode = false;
        if (!cachedFaceDb) {
            document.getElementById('teacherSection').classList.add('hidden');
            document.getElementById('scannerSection').classList.remove('hidden');
            document.getElementById('log').innerText = "⌛ โหลดฐานข้อมูลใบหน้า...";
            const res = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: "getFaceDatabase" }) }).then(r => r.json());
            cachedFaceDb = res.data;
            faceMatcher = new faceapi.FaceMatcher(cachedFaceDb.map(u => new faceapi.LabeledFaceDescriptors(u.name, [new Float32Array(u.descriptor)])), 0.55);
        }
        app.startCamera();
      },

      startCamera: async () => {
        document.getElementById('teacherSection').classList.add('hidden');
        document.getElementById('scannerSection').classList.remove('hidden');
        await Promise.all([faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL), faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL), faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)]);
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('video').srcObject = cameraStream;
        document.getElementById('video').onplay = app.process;
      },

      process: () => {
        const v = document.getElementById('video');
        const container = document.getElementById('video-container');
        const canvas = faceapi.createCanvasFromMedia(v);
        container.append(canvas);
        const size = { width: v.clientWidth, height: v.clientHeight };
        faceapi.matchDimensions(canvas, size);

        let isWorking = false; // ตัวล็อคสำคัญ!
        document.getElementById('log').innerText = "🔍 สแกนใบหน้าได้เลย";

        scanInterval = setInterval(async () => {
          if(isWorking) return;
          const detect = await faceapi.detectSingleFace(v, new faceapi.TinyFaceDetectorOptions({ inputSize: 160 })).withFaceLandmarks().withFaceDescriptor();
          
          if(detect) {
            canvas.getContext('2d').clearRect(0,0, canvas.width, canvas.height);
            faceapi.draw.drawDetections(canvas, faceapi.resizeResults(detect, size));

            if(window.isRegisterMode) {
              isWorking = true;
              document.getElementById('log').innerText = "⌛ บันทึกหน้าใหม่...";
              await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: "registerFace", username: window.enrollData.id, name: window.enrollData.name, descriptor: Array.from(detect.descriptor) })});
              alert("บันทึกหน้าเรียบร้อย!"); location.reload();
            } else {
              const match = faceMatcher.findBestMatch(detect.descriptor);
              if(match.label !== "unknown") {
                isWorking = true;
                const logBox = document.getElementById('log');
                logBox.innerText = `✨ พบคุณ ${match.label} (บันทึกข้อมูล...)`;
                logBox.style.background = "#d4edda"; logBox.style.color = "#155724";

                const res = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ 
                  action: "markAttendance", studentId: "Auto", studentName: match.label,
                  subject: document.getElementById('subjectSelect').value, period: document.getElementById('periodSelect').value,
                  teacherId: window.currentUser.id
                })}).then(r => r.json());

                logBox.innerText = `✅ ${match.label}: ${res.message}`;
                // รอ 5 วินาทีให้คนเดินออก ก่อนสแกนคนใหม่
                setTimeout(() => { isWorking = false; logBox.innerText = "🔍 สแกนคนต่อไป..."; logBox.style.background = "#fff3cd"; logBox.style.color = "#856404"; }, 5000);
              }
            }
          }
        }, 800);
      },

      closeScanner: () => {
        clearInterval(scanInterval);
        if(cameraStream) cameraStream.getTracks().forEach(t => t.stop());
        document.querySelectorAll('canvas').forEach(c => c.remove());
        document.getElementById('scannerSection').classList.add('hidden');
        document.getElementById('teacherSection').classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
