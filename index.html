<button onclick="app.openEnrollment()" style="background: #6f42c1; color: white; margin-top: 10px;">👤 ลงทะเบียนใบหน้านักเรียนใหม่</button>

<script>
  // เพิ่มฟังก์ชันเหล่านี้ในส่วนของ app = { ... }
  
  // 1. เปิดหน้าลงทะเบียน
  openEnrollment: async () => {
    const studentId = prompt("กรุณาระบุรหัสนักเรียนที่จะลงทะเบียน:");
    const studentName = prompt("กรุณาระบุชื่อ-นามสกุลนักเรียน:");
    if(!studentId || !studentName) return;

    app.currentEnrollData = { id: studentId, name: studentName };
    document.getElementById('teacherSection').classList.add('hidden');
    document.getElementById('scannerSection').classList.remove('hidden');
    document.getElementById('scanStatus').innerText = "กำลังเตรียมระบบลงทะเบียน...";
    
    // เรียกใช้กล้อง (ใช้ฟังก์ชันเดิมที่เขียนไว้)
    await app.initCameraForEnroll();
  },

  // 2. ฟังก์ชันพิเศษสำหรับแอบเก็บ Descriptor ตอนลงทะเบียน
  initCameraForEnroll: async () => {
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL) // เพิ่มตัวนี้เพื่อจำหน้า
    ]);
    
    const video = document.getElementById('video');
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = cameraStream;
    
    video.onplay = () => {
      const canvas = faceapi.createCanvasFromMedia(video);
      document.getElementById('video-container').append(canvas);
      const displaySize = { width: video.width, height: video.height };
      faceapi.matchDimensions(canvas, displaySize);

      let isDone = false;
      const interval = setInterval(async () => {
        if(isDone) return;
        
        // สแกนเพื่อหาค่า Descriptor (ลายนิ้วมือใบหน้า)
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                                       .withFaceLandmarks()
                                       .withFaceDescriptor();
        
        if (detection) {
          isDone = true;
          clearInterval(interval);
          document.getElementById('scanStatus').innerText = "⏳ กำลังส่งข้อมูลใบหน้าเข้าฐานข้อมูล...";
          
          // ส่งไปเซฟที่ Google Sheets
          const res = await fetch(https://script.google.com/macros/s/AKfycbyiCcCx8nW60UEO0lDiSp_4x0D273Barl-LHXguUith61kFH3NvzdQ4LQYOnz6KcJd5pw/exec, {
            method: 'POST',
            body: JSON.stringify({
              action: "registerFace",
              username: app.currentEnrollData.id,
              name: app.currentEnrollData.name,
              descriptor: Array.from(detection.descriptor) // ส่งค่าตัวเลขใบหน้าไป
            })
          });
          const result = await res.json();
          alert(result.message);
          app.closeScanner();
        }
      }, 500);
    };
  }
</script>
